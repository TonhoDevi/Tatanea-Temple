<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Templo de Tatânea</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/1-variables.css">
    <link rel="stylesheet" href="/css/2-base.css">
    <link rel="stylesheet" href="/css/navbar/navbar.css">

    <style>
        /* ── PAGE ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(139, 26, 26, 0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(80, 40, 10, 0.22) 0%, transparent 50%),
                linear-gradient(160deg, #0d0a04 0%, #08060200 40%, #100b03 100%),
                #0a0703;
            overflow-x: hidden;
        }

        /* Partículas de fundo */
        .auth-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(200, 160, 60, 0.4);
            border-radius: 50%;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-10vh) translateX(30px);
                opacity: 0;
            }
        }

        /* ── MAIN LAYOUT ── */
        .auth-main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ── TOME CARD ── */
        .auth-card {
            width: min(440px, 100%);
            background:
                radial-gradient(ellipse at 30% 0%, rgba(200, 160, 60, 0.07) 0%, transparent 60%),
                linear-gradient(160deg, #1a1509 0%, #0e0c05 100%);
            border: 1px solid rgba(200, 160, 60, 0.25);
            border-radius: 3px;
            box-shadow:
                0 0 0 1px rgba(200, 160, 60, 0.08),
                0 0 60px rgba(180, 120, 20, 0.12),
                0 40px 80px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Top border glow */
        .auth-card::before {
            content: '';
            display: block;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(200, 160, 60, 0.7), rgba(220, 180, 80, 1), rgba(200, 160, 60, 0.7), transparent);
        }

        /* ── HEADER ── */
        .auth-header {
            padding: 32px 36px 24px;
            text-align: center;
            border-bottom: 1px solid rgba(200, 160, 60, 0.1);
        }

        .auth-rune {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 16px rgba(220, 170, 50, 0.5));
            animation: runeFloat 3s ease-in-out infinite;
        }

        @keyframes runeFloat {

            0%,
            100% {
                transform: translateY(0) rotate(-2deg);
            }

            50% {
                transform: translateY(-6px) rotate(2deg);
            }
        }

        .auth-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #e8c96a;
            letter-spacing: 0.12em;
            text-shadow: 0 0 20px rgba(220, 170, 50, 0.3);
        }

        .auth-subtitle {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            color: rgba(200, 175, 120, 0.6);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        /* ── TABS ── */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid rgba(200, 160, 60, 0.15);
        }

        .auth-tab {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(200, 160, 60, 0.45);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .auth-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: rgba(220, 180, 60, 0.8);
            transform: scaleX(0);
            transition: transform 0.25s;
        }

        .auth-tab.active {
            color: #dfc170;
        }

        .auth-tab.active::after {
            transform: scaleX(1);
        }

        /* ── BODY ── */
        .auth-body {
            padding: 28px 36px 32px;
        }

        /* ── FORM ── */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .auth-pane {
            display: none;
        }

        .auth-pane.active {
            display: block;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .auth-label {
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(200, 160, 60, 0.65);
        }

        .auth-input {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(200, 160, 60, 0.2);
            border-radius: 2px;
            padding: 11px 14px;
            color: #e8d8a0;
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-input:focus {
            border-color: rgba(200, 160, 60, 0.55);
            box-shadow: 0 0 0 3px rgba(200, 160, 60, 0.08);
        }

        .auth-input::placeholder {
            color: rgba(200, 175, 120, 0.3);
        }

        /* Força da senha */
        .password-strength {
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.06);
            margin-top: 4px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s, background 0.3s;
        }

        .strength-weak {
            width: 33%;
            background: #c05040;
        }

        .strength-medium {
            width: 66%;
            background: #c0a040;
        }

        .strength-strong {
            width: 100%;
            background: #40a060;
        }

        /* ── BOTÃO PRINCIPAL ── */
        .auth-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #8b1a1a 0%, #6b1010 100%);
            border: none;
            border-radius: 2px;
            font-family: 'Cinzel', serif;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #f0d090;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(139, 26, 26, 0.4), inset 0 1px 0 rgba(255, 200, 100, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 4px;
        }

        .auth-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(139, 26, 26, 0.55), inset 0 1px 0 rgba(255, 200, 100, 0.2);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Shimmer no botão */
        .auth-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Loading spinner no botão */
        .btn-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(240, 208, 144, 0.3);
            border-top-color: #f0d090;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── MENSAGEM DE ERRO / SUCESSO ── */
        .auth-message {
            padding: 10px 14px;
            border-radius: 2px;
            font-family: 'Crimson Text', serif;
            font-size: 0.92rem;
            display: none;
        }

        .auth-message.error {
            background: rgba(180, 40, 40, 0.15);
            border: 1px solid rgba(180, 40, 40, 0.35);
            color: #e08080;
            display: block;
        }

        .auth-message.success {
            background: rgba(40, 160, 80, 0.12);
            border: 1px solid rgba(40, 160, 80, 0.3);
            color: #70e090;
            display: block;
        }

        /* ── DIVISOR ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Crimson Text', serif;
            font-size: 0.8rem;
            color: rgba(200, 160, 60, 0.35);
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(200, 160, 60, 0.15);
        }

        /* ── LINK ── */
        .auth-link {
            text-align: center;
            font-family: 'Crimson Text', serif;
            font-style: italic;
            color: rgba(200, 175, 120, 0.55);
            font-size: 0.88rem;
        }

        .auth-link a {
            color: rgba(200, 160, 60, 0.8);
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-link a:hover {
            color: #dfc170;
        }

        /* ── FOOTER ── */
        .auth-footer-note {
            padding: 16px 36px 20px;
            border-top: 1px solid rgba(200, 160, 60, 0.08);
            text-align: center;
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: 0.82rem;
            color: rgba(200, 175, 120, 0.35);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .auth-body {
                padding: 22px 22px 26px;
            }

            .auth-header {
                padding: 24px 22px 18px;
            }
        }
    </style>
</head>

<body>

    <!-- Partículas decorativas -->
    <div class="auth-particles" id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/index.html" class="navbar-logo">Templo de Tatânea</a>
            <ul class="navbar-menu">
                <li><a href="/index.html">Início</a></li>
            </ul>
            <button class="navbar-toggle" onclick="toggleNavbar()">🎲</button>
        </div>
    </nav>

    <!-- Main -->
    <main class="auth-main">
        <div class="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <span class="auth-rune">🔮</span>
                <div class="auth-title">Templo de Tatânea</div>
                <div class="auth-subtitle">Portal dos Aventureiros</div>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Criar Conta</button>
            </div>

            <!-- Body -->
            <div class="auth-body">

                <!-- Mensagem de feedback -->
                <div class="auth-message" id="authMessage"></div>

                <!-- ── TAB LOGIN ── -->
                <div class="auth-pane active" id="pane-login">
                    <div class="auth-form">
                        <div class="auth-field">
                            <label class="auth-label">E-mail</label>
                            <input class="auth-input" type="email" id="loginEmail" placeholder="seu@email.com"
                                autocomplete="email">
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">Senha</label>
                            <input class="auth-input" type="password" id="loginPassword" placeholder="••••••••"
                                autocomplete="current-password">
                        </div>
                        <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
                            Adentrar o Templo
                        </button>
                        <div class="auth-link">
                            <a href="#" onclick="switchAuthTab('register'); return false;">
                                Ainda não tem conta? Registre-se
                            </a>
                        </div>
                    </div>
                </div>

                <!-- ── TAB REGISTRO ── -->
                <div class="auth-pane" id="pane-register">
                    <div class="auth-form">
                        <div class="auth-field">
                            <label class="auth-label">E-mail</label>
                            <input class="auth-input" type="email" id="regEmail" placeholder="seu@email.com"
                                autocomplete="email">
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">Senha</label>
                            <input class="auth-input" type="password" id="regPassword" placeholder="Mínimo 6 caracteres"
                                autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                            <div class="password-strength">
                                <div class="password-strength-bar" id="strengthBar"></div>
                            </div>
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">Confirmar Senha</label>
                            <input class="auth-input" type="password" id="regConfirm" placeholder="Repita a senha"
                                autocomplete="new-password">
                        </div>
                        <button class="auth-btn" id="registerBtn" onclick="handleRegister()">
                            Jurar ao Templo
                        </button>
                        <div class="auth-link">
                            <a href="#" onclick="switchAuthTab('login'); return false;">
                                Já tem conta? Entre aqui
                            </a>
                        </div>
                    </div>
                </div>

            </div><!-- /auth-body -->

            <div class="auth-footer-note">
                Suas fichas ficam salvas com segurança na nuvem ✦
            </div>

        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Auth helper -->
    <script src="/js/shared/supabase-auth.js"></script>
    <!-- Navbar toggle -->
    <script src="/js/shared/navbar.js"></script>

    <script>
        // ── PARTÍCULAS ───────────────────────────────────────────
        (function spawnParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    width: ${1 + Math.random() * 2}px;
                    height: ${1 + Math.random() * 2}px;
                    animation-duration: ${6 + Math.random() * 10}s;
                    animation-delay: ${Math.random() * 8}s;
                    opacity: ${0.2 + Math.random() * 0.5};
                `;
                container.appendChild(p);
            }
        })();

        // ── TABS ─────────────────────────────────────────────────
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
            });
            document.getElementById('pane-login').classList.toggle('active', tab === 'login');
            document.getElementById('pane-register').classList.toggle('active', tab === 'register');
            hideMessage();
        }

        // ── FEEDBACK ─────────────────────────────────────────────
        function showMessage(text, type = 'error') {
            const el = document.getElementById('authMessage');
            el.textContent = text;
            el.className = `auth-message ${type}`;
        }
        function hideMessage() {
            document.getElementById('authMessage').className = 'auth-message';
        }

        // ── FORÇA DA SENHA ────────────────────────────────────────
        function checkPasswordStrength(val) {
            const bar = document.getElementById('strengthBar');
            bar.className = 'password-strength-bar';
            if (!val) return;
            if (val.length < 6) bar.classList.add('strength-weak');
            else if (val.length < 10 || !/[A-Z]/.test(val) || !/[0-9]/.test(val))
                bar.classList.add('strength-medium');
            else bar.classList.add('strength-strong');
        }

        // ── LOADING STATE ─────────────────────────────────────────
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.innerHTML = loading
                ? '<span class="btn-spinner"></span> Aguarde...'
                : (btnId === 'loginBtn' ? 'Adentrar o Templo' : 'Jurar ao Templo');
        }

        // ── LOGIN ────────────────────────────────────────────────
        async function handleLogin() {
            hideMessage();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('Preencha e-mail e senha.');
                return;
            }

            setLoading('loginBtn', true);

            const { error } = await sb.auth.signInWithPassword({ email, password });

            setLoading('loginBtn', false);

            if (error) {
                const msgs = {
                    'Invalid login credentials': 'E-mail ou senha incorretos.',
                    'Email not confirmed': 'Confirme seu e-mail antes de entrar.',
                };
                showMessage(msgs[error.message] || error.message);
                return;
            }

            // Redireciona para onde estava antes, ou para o início
            const redirect = sessionStorage.getItem('redirectAfterLogin') || '/index.html';
            sessionStorage.removeItem('redirectAfterLogin');
            window.location.href = redirect;
        }

        // ── REGISTRO ──────────────────────────────────────────────
        async function handleRegister() {
            hideMessage();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (!email || !password || !confirm) {
                showMessage('Preencha todos os campos.');
                return;
            }
            if (password.length < 6) {
                showMessage('A senha precisa ter pelo menos 6 caracteres.');
                return;
            }
            if (password !== confirm) {
                showMessage('As senhas não coincidem.');
                return;
            }

            setLoading('registerBtn', true);

            const { error } = await sb.auth.signUp({ email, password });

            setLoading('registerBtn', false);

            if (error) {
                const msgs = {
                    'User already registered': 'Este e-mail já está cadastrado.',
                };
                showMessage(msgs[error.message] || error.message);
                return;
            }

            showMessage(
                '✅ Conta criada! Verifique seu e-mail para confirmar o cadastro.',
                'success'
            );
        }

        // ── ENTER KEY ─────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.getElementById('pane-login').classList.contains('active')) handleLogin();
            else handleRegister();
        });

        // ── SE JÁ ESTIVER LOGADO, REDIRECIONA ────────────────────
        (async () => {
            const user = await getUser();
            if (user) window.location.href = '/index.html';
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — Templo de Tatânea</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/1-variables.css">
    <link rel="stylesheet" href="/css/2-base.css">
    <link rel="stylesheet" href="/css/navbar/navbar.css">

    <link rel="stylesheet" href="/css/auth/login.css">
</head>

<body>

    <!-- Partículas decorativas -->
    <div class="auth-particles" id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/index.html" class="navbar-logo">Templo de Tatânea</a>
            <ul class="navbar-menu">
                <li><a href="/index.html">Início</a></li>
            </ul>
            <button class="navbar-toggle" onclick="toggleNavbar()">☰</button>
        </div>
    </nav>

    <!-- Main -->
    <main class="auth-main">
        <div class="auth-card">

            <!-- Header -->
            <div class="auth-header">
                <span class="auth-rune">🔮</span>
                <div class="auth-title">Templo de Tatânea</div>
                <div class="auth-subtitle">Portal dos Aventureiros</div>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Criar Conta</button>
            </div>

            <!-- Body -->
            <div class="auth-body">

                <!-- Mensagem de feedback -->
                <div class="auth-message" id="authMessage"></div>

                <!-- ── TAB LOGIN ── -->
                <div class="auth-pane active" id="pane-login">
                    <div class="auth-form">
                        <div class="auth-field">
                            <label class="auth-label">E-mail</label>
                            <input class="auth-input" type="email" id="loginEmail" placeholder="seu@email.com"
                                autocomplete="email">
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">Senha</label>
                            <input class="auth-input" type="password" id="loginPassword" placeholder="••••••••"
                                autocomplete="current-password">
                        </div>
                        <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
                            Adentrar o Templo
                        </button>
                        <div class="auth-link">
                            <a href="#" onclick="switchAuthTab('register'); return false;">
                                Ainda não tem conta? Registre-se
                            </a>
                        </div>
                    </div>
                </div>

                <!-- ── TAB REGISTRO ── -->
                <div class="auth-pane" id="pane-register">
                    <div class="auth-form">
                        <div class="auth-field">
                            <label class="auth-label">E-mail</label>
                            <input class="auth-input" type="email" id="regEmail" placeholder="seu@email.com"
                                autocomplete="email">
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">Senha</label>
                            <input class="auth-input" type="password" id="regPassword" placeholder="Mínimo 6 caracteres"
                                autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                            <div class="password-strength">
                                <div class="password-strength-bar" id="strengthBar"></div>
                            </div>
                        </div>
                        <div class="auth-field">
                            <label class="auth-label">Confirmar Senha</label>
                            <input class="auth-input" type="password" id="regConfirm" placeholder="Repita a senha"
                                autocomplete="new-password">
                        </div>
                        <button class="auth-btn" id="registerBtn" onclick="handleRegister()">
                            Jurar ao Templo
                        </button>
                        <div class="auth-link">
                            <a href="#" onclick="switchAuthTab('login'); return false;">
                                Já tem conta? Entre aqui
                            </a>
                        </div>
                    </div>
                </div>

            </div><!-- /auth-body -->

            <div class="auth-footer-note">
                Suas fichas ficam salvas com segurança na nuvem ✦
            </div>

        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Auth helper -->
    <script src="/js/shared/supabase-auth.js"></script>
    <!-- Navbar toggle -->
    <script src="/js/shared/navbar.js"></script>

    <script src="/js/auth/login.js"></script>
</body>

</html>

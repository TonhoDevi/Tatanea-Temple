<svg xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradientes CA -->
        <linearGradient id="gradCA" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7eb8f7" />
            <stop offset="100%" stop-color="#1a3d7a" />
        </linearGradient>
        <linearGradient id="gradCAInner" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#5a9ce0" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#0d2455" stop-opacity="0.1" />
        </linearGradient>
        <!-- Gradientes Vida -->
        <linearGradient id="gradVida" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#f07090" />
            <stop offset="100%" stop-color="#6e0a18" />
        </linearGradient>
        <linearGradient id="gradVidaMax" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#70b0f0" />
            <stop offset="100%" stop-color="#0a3a6e" />
        </linearGradient>
        <linearGradient id="gradVidaTemp" x1="20%" y1="0%" x2="80%" y2="100%">
            <stop offset="0%" stop-color="#f5d070" />
            <stop offset="100%" stop-color="#8a5800" />
        </linearGradient>
        <!-- Gradiente Iniciativa -->
        <linearGradient id="gradInit" x1="30%" y1="0%" x2="70%" y2="100%">
            <stop offset="0%" stop-color="#f5e070" />
            <stop offset="100%" stop-color="#8a5800" />
        </linearGradient>
        <linearGradient id="gradInitInner" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffe090" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#a07000" stop-opacity="0.0" />
        </linearGradient>
    </defs>

    <!-- SÍMBOLO: Escudo (CA) -->
    <symbol id="icon-shield-ca" viewBox="0 0 108 122">
        <path d="M 54,4 L 102,22 L 102,60 C 102,90 78,112 54,118 C 30,112 6,90 6,60 L 6,22 Z"
            fill="url(#gradCA)" stroke="#a8d4ff" stroke-width="1.5" stroke-opacity="0.5" />
        <path d="M 54,12 L 95,27 L 95,60 C 95,86 74,106 54,111 C 34,106 13,86 13,60 L 13,27 Z"
            fill="url(#gradCAInner)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" />
        <line x1="22" y1="52" x2="86" y2="52" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
        <line x1="54" y1="14" x2="54" y2="108" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.12" />
    </symbol>

    <!-- SÍMBOLO: Coração (Vida Atual) -->
    <symbol id="icon-heart-main" viewBox="0 0 138 130">
        <path d="M 69,118 C 69,118 8,76 8,40 C 8,18 24,4 44,4 C 55,4 65,9 69,19 C 73,9 83,4 94,4 C 114,4 130,18 130,40 C 130,76 69,118 69,118 Z"
            fill="url(#gradVida)" stroke="#ffb0b0" stroke-width="1.5" stroke-opacity="0.45" />
        <ellipse cx="45" cy="28" rx="14" ry="9" fill="white" fill-opacity="0.12" transform="rotate(-25,45,28)" />
    </symbol>

    <!-- SÍMBOLO: Coração Pequeno (Vida Máx) -->
    <symbol id="icon-heart-max" viewBox="0 0 100 95">
        <path d="M 50,85 C 50,85 10,55 10,30 C 10,12 22,2 38,2 C 46,2 54,6 50,14 C 46,6 54,2 62,2 C 78,2 90,12 90,30 C 90,55 50,85 50,85 Z"
            fill="url(#gradVidaMax)" stroke="#a8d4ff" stroke-width="1.2" stroke-opacity="0.45" />
    </symbol>

    <!-- SÍMBOLO: Coração Pequeno (Vida Temp) -->
    <symbol id="icon-heart-temp" viewBox="0 0 100 95">
        <path d="M 50,85 C 50,85 10,55 10,30 C 10,12 22,2 38,2 C 46,2 54,6 50,14 C 46,6 54,2 62,2 C 78,2 90,12 90,30 C 90,55 50,85 50,85 Z"
            fill="url(#gradVidaTemp)" stroke="#ffe890" stroke-width="1.2" stroke-opacity="0.45" />
    </symbol>

    <!-- SÍMBOLO: Raio (Iniciativa) -->
    <symbol id="icon-bolt-init" viewBox="0 0 86 122">
        <path d="M 60,4 L 18,62 L 42,62 L 26,118 L 68,56 L 44,56 Z"
            fill="url(#gradInit)" stroke="#ffe890" stroke-width="1.5" stroke-opacity="0.55" />
        <path d="M 56,12 L 24,62 L 44,62 L 30,108 L 62,58 L 42,58 Z"
            fill="url(#gradInitInner)" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.2" />
    </symbol>
</svg>
